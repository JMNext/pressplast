name: Deploy Website to IHC.ru

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  web-deploy:
    name: 🎉 Deploy via SFTP
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files via SFTP (rsync)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: p1036777
          server: p1036777.ftp.ihc.ru
          port: 22
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './*'
          remote_path: '/home/p1036777/www/matrixplast.ru'
          sftpArgs: '-o ConnectTimeout=5'
          rsyncArgs: '--exclude=.git* --exclude=.agents* --exclude=tasks --exclude=AGENTS.md --exclude=AGENTS.local.md --exclude=CLAUDE.md --exclude=GEMINI.md --exclude=README.md --exclude=config.php'
